name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version-file: 'pyproject.toml'
      - uses: pre-commit/action@v3.0.1

  run_regressions:
    name: Test code
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # generate_references.sh installs meshwell at HEAD~1 to
          # produce reference .msh / .xao files that the local working
          # tree is then compared against byte-by-byte. Default
          # checkout depth is 1, so we need at least 2.
          fetch-depth: 2
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Generate references from reference version
        run: bash generate_references.sh
        working-directory: tests
      - name: Install dependencies
        run: sudo apt-get install libglu1-mesa
      - name: Test
        run: uv run --extra dev pytest -n auto
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
